name: stratum

services:
  nats:
    image: nats:2-alpine
    command: ["-js", "--store_dir", "/data", "--http_port", "8222"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-Y", "off", "-O", "/dev/null", "http://127.0.0.1:8222/healthz"]
      interval: 2s
      timeout: 2s
      retries: 15
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

  stratum-api:
    build:
      context: .
      dockerfile: Dockerfile.rust
      args:
        PACKAGE: stratum-api
        BIN: stratum-api
    depends_on:
      nats:
        condition: service_healthy
    ports:
      - "18080:8080"
    volumes:
      - stratum-agent-data:/var/lib/stratum
      - ./templates:/var/lib/stratum/agents/templates:ro
      - ./config.docker.toml:/app/config.toml:ro
    environment:
      RUST_LOG: info

  stratum-web:
    build:
      context: ./stratum-web
    depends_on:
      - stratum-api
    ports:
      - "5173:3000"

volumes:
  nats-data:
  stratum-agent-data:
