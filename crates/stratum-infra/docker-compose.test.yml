name: stratum-infra-test

services:
  nats-stream:
    image: nats:2-alpine
    command: ["-js", "--store_dir", "/data", "--http_port", "8222"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-Y", "off", "-O", "/dev/null", "http://127.0.0.1:8222/healthz"]
      interval: 1s
      timeout: 1s
      retries: 10
    ports:
      - "44227:4222"
    volumes:
      - nats-stream-data:/data

volumes:
  nats-stream-data:
