[workspace]
members = [
    "crates/wyse-core",
    "crates/wyse-infra",
    "crates/wyse-llm",
]
resolver = "3"

[workspace.package]
edition = "2024"
rust-version = "1.88"
license = "MIT"

[workspace.dependencies]
async-nats = "0.49.1"
bytes = "1.11.0"
chrono = { version = "0.4.45", features = ["serde"] }
futures-core = "0.3.32"
futures-util = "0.3.32"
reqwest = { version = "0.12.25", default-features = false, features = ["json", "rustls-tls", "stream"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
tokio = { version = "1.48.0", features = ["macros", "rt-multi-thread", "time"] }
uuid = { version = "1.23.4", features = ["serde", "std", "v7"] }
wyse-core = { path = "crates/wyse-core" }

[workspace.lints.clippy]
correctness = "deny"
suspicious = "warn"
style = "warn"
complexity = "warn"
perf = "warn"
